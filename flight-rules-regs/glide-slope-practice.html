<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glide Slope Practice — NIFE Study Materials</title>
  <style>
    :root {
      --bg:           #06090f;
      --surface:      #0b1020;
      --surface-hi:   #101828;
      --border:       #172035;
      --border-hi:    #253550;
      --amber:        #e89a10;
      --amber-dim:    rgba(232, 154, 16, 0.12);
      --amber-glow:   rgba(232, 154, 16, 0.25);
      --text:         #b0c4dc;
      --text-dim:     #3d5570;
      --white:        #ddeeff;
      --color:        #e89a10;
      --color-glow:   rgba(232, 154, 16, 0.2);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(23, 32, 53, 0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 32, 53, 0.5) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 28px;
      position: relative;
      z-index: 1;
    }

    header {
      position: relative;
      z-index: 1;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 22px 0;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.18s;
    }

    .back-link:hover { color: var(--color); }
    .back-link svg { width: 12px; height: 12px; }

    .header-tag {
      margin-left: auto;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--color);
      opacity: 0.7;
    }

    .page-hero {
      padding: 64px 0 48px;
      animation: riseIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .page-eyebrow {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--color);
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .page-title {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -2px;
      color: var(--white);
      line-height: 1;
      margin-bottom: 16px;
    }

    .page-desc {
      font-size: 14px;
      color: var(--text-dim);
      max-width: 520px;
      line-height: 1.7;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 0 48px;
    }

    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ---- Tabs ---- */

    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 40px;
    }

    .mode-tab {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 24px;
      border: 1px solid var(--border-hi);
      border-radius: 3px;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
    }

    .mode-tab.active {
      border-color: var(--color);
      color: var(--color);
      background: var(--amber-dim);
    }

    .mode-tab:hover:not(.active) { color: var(--text); }

    /* ---- Sim area ---- */

    .interactive { padding-bottom: 96px; }

    .sim-area {
      display: grid;
      grid-template-columns: 1fr 100px;
      gap: 56px;
      align-items: center;
    }

    /* ---- Lights panel ---- */

    .lights-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* PAPI */

    .papi-housing {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: 12px;
      padding: 32px 44px;
      display: flex;
      gap: 22px;
      align-items: center;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .papi-housing.solved {
      border-color: #28c97a;
      box-shadow: 0 0 40px rgba(40, 201, 122, 0.2);
    }

    .papi-light {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #120808;
      transition: background 0.22s, box-shadow 0.22s;
    }

    .papi-light.red {
      background: #e03030;
      box-shadow: 0 0 18px #e03030, 0 0 48px rgba(224, 48, 48, 0.45);
    }

    .papi-light.white {
      background: #ddeeff;
      box-shadow: 0 0 18px rgba(221, 238, 255, 0.95), 0 0 48px rgba(221, 238, 255, 0.4);
    }

    /* VASI */

    .vasi-housing {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: 12px;
      padding: 28px 44px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .vasi-housing.solved {
      border-color: #28c97a;
      box-shadow: 0 0 40px rgba(40, 201, 122, 0.2);
    }

    .vasi-bar-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .vasi-bar-label {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .vasi-bar {
      width: 120px;
      height: 52px;
      border-radius: 8px;
      background: #120808;
      border: 1px solid var(--border);
      transition: background 0.22s, box-shadow 0.22s;
    }

    .vasi-bar.red {
      background: #e03030;
      box-shadow: 0 0 16px #e03030, 0 0 44px rgba(224, 48, 48, 0.45);
    }

    .vasi-bar.white {
      background: #ddeeff;
      box-shadow: 0 0 16px rgba(221, 238, 255, 0.95), 0 0 44px rgba(221, 238, 255, 0.4);
    }

    /* Status */

    .status-readout {
      text-align: center;
      min-height: 56px;
    }

    .status-main {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      transition: color 0.2s;
    }

    .status-action {
      font-family: 'Courier New', monospace;
      font-size: 20px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 700;
      min-height: 28px;
      transition: color 0.2s;
    }

    /* ---- Stick ---- */

    .stick-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      user-select: none;
    }

    .stick-dir {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.5;
    }

    .stick-track {
      width: 48px;
      height: 220px;
      background: var(--surface);
      border: 1px solid var(--border-hi);
      border-radius: 24px;
      position: relative;
      touch-action: none;
    }

    .stick-thumb {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #f8c040, #c87010);
      box-shadow: 0 0 14px rgba(232, 154, 16, 0.7), 0 0 28px rgba(232, 154, 16, 0.3);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      cursor: grab;
      touch-action: none;
      transition: top 0.32s cubic-bezier(0.16, 1, 0.3, 1), background 0.25s, box-shadow 0.25s;
    }

    .stick-thumb:active { cursor: grabbing; }

    .stick-thumb.solved {
      background: radial-gradient(circle at 38% 35%, #5ce89a, #1fa05a);
      box-shadow: 0 0 14px rgba(40, 201, 122, 0.8), 0 0 28px rgba(40, 201, 122, 0.3);
    }

    /* ---- Streak ---- */

    .streak-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    .streak-label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .streak-count {
      font-size: 32px;
      font-weight: 700;
      color: var(--color);
      line-height: 1;
      letter-spacing: -1px;
      min-width: 2ch;
    }

    .streak-count.bump {
      animation: bump 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .streak-pips {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .streak-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-hi);
      transition: background 0.2s, box-shadow 0.2s;
    }

    .streak-pip.lit {
      background: var(--color);
      box-shadow: 0 0 6px var(--color-glow);
    }

    /* ---- Animations ---- */

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bump {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.28); }
      100% { transform: scale(1); }
    }

    .hidden { display: none !important; }

    @media (max-width: 600px) {
      .sim-area {
        grid-template-columns: 1fr;
        justify-items: center;
      }
    }

    @media (max-width: 520px) {
      .footer-inner { flex-direction: column; gap: 10px; text-align: center; }
    }
  </style>
</head>
<body>

<header></header>

<div class="wrap">
  <section class="page-hero">
    <p class="page-eyebrow">Interactive</p>
    <h1 class="page-title">Glide Slope Practice</h1>
    <p class="page-desc">Read the approach lights and drag the pitch stick to get back on glidepath. Pull aft when low, push forward when high.</p>
  </section>
  <div class="divider"></div>

  <div class="interactive">

    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="papi">PAPI</button>
      <button class="mode-tab" data-mode="vasi">VASI</button>
    </div>

    <div class="sim-area">

      <div class="lights-panel">

        <!-- PAPI -->
        <div class="papi-housing" id="papiHousing">
          <div class="papi-light" id="pl0"></div>
          <div class="papi-light" id="pl1"></div>
          <div class="papi-light" id="pl2"></div>
          <div class="papi-light" id="pl3"></div>
        </div>

        <!-- VASI -->
        <div class="vasi-housing hidden" id="vasiHousing">
          <div class="vasi-bar-wrap">
            <div class="vasi-bar-label">Far</div>
            <div class="vasi-bar" id="vasiFar"></div>
          </div>
          <div class="vasi-bar-wrap">
            <div class="vasi-bar-label">Near</div>
            <div class="vasi-bar" id="vasiNear"></div>
          </div>
        </div>

        <!-- Status -->
        <div class="status-readout">
          <div class="status-main"   id="statusMain"></div>
          <div class="status-action" id="statusAction"></div>
        </div>

      </div>

      <!-- Pitch stick -->
      <div class="stick-panel">
        <div class="stick-dir">&#8593;<br>Push<br>Fwd</div>
        <div class="stick-track" id="stickTrack">
          <div class="stick-thumb" id="stickThumb"></div>
        </div>
        <div class="stick-dir">Pull<br>Aft<br>&#8595;</div>
      </div>

    </div>

    <div class="streak-row">
      <span class="streak-label">Streak</span>
      <span class="streak-count" id="streakCount">0</span>
      <div class="streak-pips" id="streakPips">
        <div class="streak-pip"></div>
        <div class="streak-pip"></div>
        <div class="streak-pip"></div>
        <div class="streak-pip"></div>
        <div class="streak-pip"></div>
      </div>
    </div>

  </div>
</div>

<footer></footer>

<script src="/components.js"></script>
<script>
  initHeader({ back: '/flight-rules-regs/', tag: 'Module 03 — Flight Rules &amp; Regs' });
  initFooter();

  // ---- Data ----

  // true = red, false = white. Lights ordered left to right.
  var PAPI_PATTERN = {
    '-2': [true,  true,  true,  true ],
    '-1': [true,  true,  true,  false],
     '0': [true,  true,  false, false],
     '1': [true,  false, false, false],
     '2': [false, false, false, false],
  };

  // VASI: [far bar, near bar]. 'red' = below that bar's sector, 'white' = above.
  // red/red = low, red/white = on glidepath, white/white = high.
  var VASI_PATTERN = {
    '-2': ['red',   'red'  ],
    '-1': ['red',   'red'  ],
     '0': ['red',   'white'],
     '1': ['white', 'white'],
     '2': ['white', 'white'],
  };

  // Status display info per deviation
  var STATUS = {
    '-2': { main: 'Significantly Low',  action: 'Pull Up',   mainColor: '#e03030', actionColor: '#e03030' },
    '-1': { main: 'Slightly Low',       action: 'Pull Up',   mainColor: '#e05050', actionColor: '#e05050' },
     '0': { main: 'On Glidepath',       action: '',          mainColor: '#28c97a', actionColor: '#28c97a' },
     '1': { main: 'Slightly High',      action: 'Push Down', mainColor: '#8ab0d0', actionColor: '#8ab0d0' },
     '2': { main: 'Significantly High', action: 'Push Down', mainColor: '#b0c4dc', actionColor: '#b0c4dc' },
  };

  // ---- State ----

  var state = {
    mode:        'papi',
    scenarioDev: -1,  // deviation shown at the start of each rep
    stickOffset: 0,   // user's stick position relative to center (-2..+2)
    dragging:    false,
    solved:      false,
    holdTimer:   null,
    streak:      0,
  };

  // Deviation currently shown in the lights
  function currentDev() {
    return Math.max(-2, Math.min(2, state.scenarioDev + state.stickOffset));
  }

  // ---- Elements ----

  var papiHousing  = document.getElementById('papiHousing');
  var vasiHousing  = document.getElementById('vasiHousing');
  var papiLights   = [0,1,2,3].map(function(i){ return document.getElementById('pl'+i); });
  var vasiFar      = document.getElementById('vasiFar');
  var vasiNear     = document.getElementById('vasiNear');
  var statusMain   = document.getElementById('statusMain');
  var statusAction = document.getElementById('statusAction');
  var stickTrack   = document.getElementById('stickTrack');
  var stickThumb   = document.getElementById('stickThumb');
  var streakCount  = document.getElementById('streakCount');
  var streakPips   = Array.from(document.querySelectorAll('.streak-pip'));

  // ---- Stick geometry ----

  var TRACK_H  = 220;           // matches CSS .stick-track height
  var THUMB_D  = 40;            // thumb diameter — matches CSS
  var USABLE_H = TRACK_H - THUMB_D;  // 180px of usable travel

  // stickOffset (+2 … -2) → thumb top in px
  // Inverted (stick-like): offset +2 (pull aft / nose up) = thumb at bottom, -2 (push fwd / nose dn) = top
  function devToTop(dev) {
    return ((dev + 2) / 4) * USABLE_H;
  }

  // raw thumb top in px → nearest deviation step
  function topToDev(top) {
    var clamped = Math.max(0, Math.min(USABLE_H, top));
    var raw     = (clamped / USABLE_H) * 4 - 2;
    return Math.round(Math.max(-2, Math.min(2, raw)));
  }

  // ---- Render ----

  function render() {
    var dev    = currentDev();
    var key    = String(dev);
    var info   = STATUS[key];
    var solved = dev === 0;

    // PAPI lights
    var pattern = PAPI_PATTERN[key];
    papiLights.forEach(function(el, i) {
      el.classList.toggle('red',   pattern[i]);
      el.classList.toggle('white', !pattern[i]);
    });
    papiHousing.classList.toggle('solved', solved);

    // VASI bars
    var vasiPat = VASI_PATTERN[key];
    vasiFar.className  = 'vasi-bar ' + vasiPat[0];
    vasiNear.className = 'vasi-bar ' + vasiPat[1];
    vasiHousing.classList.toggle('solved', solved);

    // Status text
    statusMain.textContent   = info.main;
    statusMain.style.color   = info.mainColor;
    statusAction.textContent = info.action;
    statusAction.style.color = info.actionColor;

    // Stick thumb: position reflects stickOffset, not absolute deviation
    stickThumb.style.top = devToTop(state.stickOffset) + 'px';
    stickThumb.classList.toggle('solved', solved);

    // Streak pips (cycle every 5)
    var lit = (state.streak % 5 === 0 && state.streak > 0) ? 5 : state.streak % 5;
    streakPips.forEach(function(pip, i) { pip.classList.toggle('lit', i < lit); });
    streakCount.textContent = state.streak;
  }

  // ---- New scenario ----

  function newScenario() {
    var pool        = [-2, -1, 1, 2].filter(function(d){ return d !== state.scenarioDev; });
    state.scenarioDev = pool[Math.floor(Math.random() * pool.length)];
    state.stickOffset = 0;  // always reset stick to center
    state.solved      = false;
    clearTimeout(state.holdTimer);
    state.holdTimer   = null;
    render();
  }

  // ---- Success / hold logic ----

  function checkSolved() {
    if (currentDev() === 0 && !state.solved) {
      if (state.holdTimer) return;
      state.holdTimer = setTimeout(function() {
        if (currentDev() !== 0 || state.solved) return;
        state.solved = true;
        state.streak += 1;
        render();
        // Bump animation on streak counter
        streakCount.classList.remove('bump');
        void streakCount.offsetWidth;
        streakCount.classList.add('bump');
        setTimeout(newScenario, 900);
      }, 600);
    } else if (currentDev() !== 0 && state.holdTimer) {
      clearTimeout(state.holdTimer);
      state.holdTimer = null;
    }
  }

  // ---- Drag ----

  var dragStartY   = 0;
  var dragStartTop = 0;

  stickThumb.addEventListener('pointerdown', function(e) {
    if (state.solved) return;
    e.preventDefault();
    state.dragging = true;
    dragStartY     = e.clientY;
    dragStartTop   = devToTop(state.stickOffset);  // start from current offset position
    stickThumb.style.transition = 'background 0.25s, box-shadow 0.25s';
    stickThumb.setPointerCapture(e.pointerId);
  });

  stickThumb.addEventListener('pointermove', function(e) {
    if (!state.dragging) return;
    var rawTop     = dragStartTop + (e.clientY - dragStartY);
    var clamped    = Math.max(0, Math.min(USABLE_H, rawTop));
    var newOffset  = topToDev(clamped);
    var dev        = Math.max(-2, Math.min(2, state.scenarioDev + newOffset));

    stickThumb.style.top = clamped + 'px';
    stickThumb.classList.toggle('solved', dev === 0);

    if (newOffset !== state.stickOffset) {
      state.stickOffset = newOffset;
      renderLightsOnly();
      checkSolved();
    }
  });

  stickThumb.addEventListener('pointerup', function() {
    if (!state.dragging) return;
    state.dragging = false;
    stickThumb.style.transition = '';
    stickThumb.style.top = devToTop(state.stickOffset) + 'px';
  });

  stickThumb.addEventListener('pointercancel', function() {
    state.dragging = false;
    stickThumb.style.transition = '';
  });

  // Lights-only render used during drag (avoids repositioning thumb mid-drag)
  function renderLightsOnly() {
    var dev  = currentDev();
    var key  = String(dev);
    var info = STATUS[key];

    var pattern = PAPI_PATTERN[key];
    papiLights.forEach(function(el, i) {
      el.classList.toggle('red',   pattern[i]);
      el.classList.toggle('white', !pattern[i]);
    });
    papiHousing.classList.toggle('solved', dev === 0);

    var vasiPat = VASI_PATTERN[key];
    vasiFar.className  = 'vasi-bar ' + vasiPat[0];
    vasiNear.className = 'vasi-bar ' + vasiPat[1];
    vasiHousing.classList.toggle('solved', dev === 0);

    statusMain.textContent   = info.main;
    statusMain.style.color   = info.mainColor;
    statusAction.textContent = info.action;
    statusAction.style.color = info.actionColor;
  }

  // ---- Tabs ----

  document.querySelectorAll('.mode-tab').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (btn.dataset.mode === state.mode) return;
      document.querySelectorAll('.mode-tab').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      state.mode   = btn.dataset.mode;
      state.streak = 0;
      clearTimeout(state.holdTimer);
      state.holdTimer = null;

      papiHousing.classList.toggle('hidden', state.mode !== 'papi');
      vasiHousing.classList.toggle('hidden', state.mode !== 'vasi');

      newScenario();
    });
  });

  // ---- Init ----

  newScenario();
</script>
</body>
</html>
